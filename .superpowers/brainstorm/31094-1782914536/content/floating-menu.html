<h2>Menu flutuante ao clicar na ⚙</h2>
<p class="subtitle">O box vermelho não muda — o menu aparece por cima</p>

<div class="split">

  <div class="mockup">
    <div class="mockup-header">Painel fechado</div>
    <div class="mockup-body" style="padding:1.5rem;display:flex;flex-direction:column;align-items:center">
      <div style="background:#311B1B;border-radius:8px;padding:2rem;width:100%;display:flex;flex-direction:column;align-items:center;gap:1rem">
        <div style="background:#EC443E;border-radius:8px;padding:1.5rem 2rem;color:#eee;font-family:monospace;text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;gap:0.8rem;position:relative">
          <div style="position:absolute;top:0.5rem;right:0.5rem;background:#eee;color:#D63731;width:1.5rem;height:1.5rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer">⚙</div>
          <div style="font-size:2.5rem;font-weight:bold">25:00</div>
          <div style="display:flex;gap:0.5rem">
            <div style="background:#eee;color:#6f6f6e;padding:0.3rem 0.8rem;border-radius:6px;font-size:0.75rem">INICIAR</div>
            <div style="background:#eee;color:#6f6f6e;padding:0.3rem 0.8rem;border-radius:6px;font-size:0.75rem">REINICIAR</div>
          </div>
        </div>
      </div>
      <div style="margin-top:0.8rem;font-size:0.72rem;color:#888;text-align:center">Box vermelho estático, tamanho fixo</div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">Painel aberto (flutuante)</div>
    <div class="mockup-body" style="padding:1.5rem;display:flex;flex-direction:column;align-items:center">
      <div style="background:#311B1B;border-radius:8px;padding:2rem;width:100%;display:flex;flex-direction:column;align-items:center;gap:1rem;position:relative">
        <div style="background:#EC443E;border-radius:8px;padding:1.5rem 2rem;color:#eee;font-family:monospace;text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;gap:0.8rem;position:relative">
          <div style="position:absolute;top:0.5rem;right:0.5rem;background:#D63731;color:#eee;width:1.5rem;height:1.5rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer">⚙</div>
          <div style="font-size:2.5rem;font-weight:bold">25:00</div>
          <div style="display:flex;gap:0.5rem">
            <div style="background:#eee;color:#6f6f6e;padding:0.3rem 0.8rem;border-radius:6px;font-size:0.75rem">INICIAR</div>
            <div style="background:#eee;color:#6f6f6e;padding:0.3rem 0.8rem;border-radius:6px;font-size:0.75rem">REINICIAR</div>
          </div>

          <!-- Menu flutuante -->
          <div style="position:absolute;top:0.5rem;right:2.2rem;background:#fff;border-radius:8px;padding:0.8rem 1rem;box-shadow:0 4px 16px rgba(0,0,0,0.25);font-size:0.75rem;color:#311B1B;min-width:130px;text-align:left;z-index:10">
            <div style="font-weight:bold;font-size:0.65rem;color:#888;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em">Configurações</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.45rem">
              <span>Foco</span>
              <span style="display:flex;align-items:center;gap:0.25rem">
                <span style="background:#f0f0f0;border-radius:3px;width:1rem;height:1rem;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;color:#6f6f6e">−</span>
                <span style="font-weight:bold">25</span>
                <span style="background:#f0f0f0;border-radius:3px;width:1rem;height:1rem;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;color:#6f6f6e">+</span>
              </span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.45rem">
              <span>Pausa</span>
              <span style="display:flex;align-items:center;gap:0.25rem">
                <span style="background:#f0f0f0;border-radius:3px;width:1rem;height:1rem;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;color:#6f6f6e">−</span>
                <span style="font-weight:bold">&nbsp;5</span>
                <span style="background:#f0f0f0;border-radius:3px;width:1rem;height:1rem;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;color:#6f6f6e">+</span>
              </span>
            </div>
            <div style="border-top:1px solid #eee;margin:0.4rem 0"></div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span>Som</span>
              <span style="display:flex;align-items:center;gap:0.3rem">
                <span>🔊</span>
                <span style="background:#e0e0e0;border-radius:20px;width:2rem;height:1rem;display:inline-flex;align-items:center;padding:0.1rem">
                  <span style="background:#D63731;border-radius:50%;width:0.8rem;height:0.8rem;margin-left:auto;display:block"></span>
                </span>
              </span>
            </div>
          </div>

        </div>
      </div>
      <div style="margin-top:0.8rem;font-size:0.72rem;color:#888;text-align:center">Menu flutua por cima, box não se move</div>
    </div>
  </div>

</div>
